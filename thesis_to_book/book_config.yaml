  - "GNC (Guidance, Navigation, and Control)"
  - "GNSS (Global Navigation Satellite System)"
  - "IMU (Inertial Measurement Unit)"
  - "PCA (Principal Component Analysis)"
  - "K-Means Clustering"
  - "KD-Tree"
  - "YOLOv5s"
  - "YOLOv8"
